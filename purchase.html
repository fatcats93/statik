<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* TOP TITLE (stays above everything) */
    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 20px;
      position: relative;
      z-index: 10;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh; /* full screen */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: -50px;
    }

    /* BIG STATIK IMAGE */
    .hero img {
      width: 110%;
      height: 110%;
      object-fit: contain;
      transform: scale(1.1); /* makes it feel massive */
      position: relative;
      z-index: 1;
    }

    /* DARK OVERLAY (optional but makes banner pop) */
    .overlay-dark {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.15);
      z-index: 2;
    }

    /* COMING SOON BANNER */
    .banner {
      position: absolute;

      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      background-color: rgba(255, 143, 177, 0.95);

      padding: 60px 120px;

      border: 6px solid black;
      border-radius: 30px;

      font-size: 90px;
      font-weight: bold;
      color: black;

      text-align: center;

      z-index: 5;
    }

  </style>
</head>

<body>

  <!-- TITLE (stays on top) -->
  <img src="hometitle1.jpg" class="title">

  <!-- HERO -->
  <div class="hero">

    <img src="statiktitle.png">

    <div class="overlay-dark"></div>

    <div class="banner">
      COMING SOON!!
    </div>

  </div>

</body>
</html>
