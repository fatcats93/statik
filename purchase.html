<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 20px;
    }

    /* HERO AREA */
    .hero {
      position: relative;
      width: 100%;
      height: 130vh; /* taller area so image can go higher + bigger */

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding-top: 0px; /* removed padding so it can rise higher */
    }

    /* IMAGE (BIGGER + HIGHER) */
    .hero img {
      width: 120%;       /* bigger */
      height: 120%;      /* bigger */
      object-fit: contain;

      margin-top: -120px; /* ⬅️ pushes image WAY higher */

      display: block;

      position: relative;
      z-index: 1;
    }

    /* COMING SOON BANNER */
    .banner {
      position: absolute;

      top: 48%; /* stays centered on new larger image */
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 160px 260px;

      border: 6px solid black;
      border-radius: 40px;

      font-size: 150px;
      font-weight: bold;
      text-align: center;

      background-color: rgba(255, 143, 177, 0.95);
      color: black;

      z-index: 5;
    }

  </style>
</head>

<body>

  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <img src="statiktitle.png">

    <div class="banner">
      COMING SOON!!
    </div>

  </div>

</body>
</html>
