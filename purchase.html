<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* MAIN TOP TITLE (can be overlapped now) */
    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 20px;
      position: relative;
      z-index: 2;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 130vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* 🔥 IMAGE MUCH HIGHER NOW */
    .hero img {
      width: 112%;
      height: 112%;
      object-fit: contain;

      margin-top: -420px; /* ⬅️ WAY higher than before */

      display: block;

      position: relative;
      z-index: 1;
    }

    /* 🔥 BANNER ONLY ACROSS IMAGE */
    .banner {
      position: absolute;

      top: 45%; /* sits across image */
      left: 0;

      width: 100%;

      transform: translateY(-50%);

      padding: 70px 0;

      border-top: 6px solid black;
      border-bottom: 6px solid black;

      font-size: 140px;
      font-weight: bold;

      text-align: center;

      background-color: rgba(255, 143, 177, 0.95);
      color: black;

      z-index: 5;
    }

  </style>
</head>

<body>

  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <img src="statiktitle.png">

    <div class="banner">
      COMING SOON!!
    </div>

  </div>

</body>
</html>
