<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* 🧠 HEADER ALWAYS BEHIND HERO */
    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 0;

      position: relative;
      z-index: 1; /* BACK LAYER */
    }

    /* 🧠 HERO STACKS ABOVE HEADER */
    .hero {
      position: relative;
      width: 100%;
      height: 140vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      z-index: 10; /* ABOVE HEADER */
      margin-top: -200px; /* pulls hero upward WITHOUT breaking layout */
    }

    /* STATIK IMAGE (NORMALIZED POSITION) */
    .hero img {
      width: 112%;
      height: 112%;
      object-fit: contain;

      position: relative;
      z-index: 10;
    }

    /* 🔥 BANNER HIGH ABOVE IMAGE */
    .banner {
      position: absolute;

      top: -500px; /* strong upward position */

      left: 50%;
      transform: translateX(-50%);

      width: 100%;

      padding: 80px 0;

      border-top: 6px solid black;
      border-bottom: 6px solid black;

      font-size: 140px;
      font-weight: bold;

      text-align: center;

      background-color: rgba(255, 143, 177, 0.95);
      color: black;

      z-index: 20; /* ABOVE IMAGE */
    }

  </style>
</head>

<body>

  <!-- HEADER (NOW BEHIND HERO) -->
  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <div class="banner">
      COMING SOON!!
    </div>

    <img src="statiktitle.png">

  </div>

</body>
</html>
