<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* HOME TITLE (LOWEST LAYER) */
    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 0;
      position: relative;
      z-index: 1;
    }

    /* HERO WRAPPER */
    .hero {
      position: relative;
      width: 100%;
      height: 140vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* 🔥 STATIK IMAGE: WAY HIGHER (ABOVE HOMETITLE) */
    .hero img {
      width: 112%;
      height: 112%;
      object-fit: contain;

      margin-top: -600px; /* ⬅️ VERY HIGH now */

      position: relative;
      z-index: 5;
    }

    /* 🔥 BANNER ONLY OVER STATIK IMAGE */
    .banner {
      position: absolute;

      top: 20%; /* only across statik image area */
      left: 50%;
      transform: translate(-50%, -50%);

      width: 90%; /* ONLY spans image width */

      padding: 80px 0;

      border-top: 6px solid black;
      border-bottom: 6px solid black;

      font-size: 140px;
      font-weight: bold;

      text-align: center;

      background-color: rgba(255, 143, 177, 0.95);
      color: black;

      z-index: 10;
    }

  </style>
</head>

<body>

  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <img src="statiktitle.png">

    <div class="banner">
      COMING SOON!!
    </div>

  </div>

</body>
</html>
