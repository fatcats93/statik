<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 80px auto 20px;
      position: relative;
      z-index: 10;
    }

    /* HERO WRAPPER */
    .hero {
      position: relative;
      width: 100%;
      height: 110vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* BIG IMAGE (NO COLOR CHANGES, NO OVERLAP) */
    .hero img {
      width: 105%;
      height: 105%;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* BANNER (BIGGER + HIGHER) */
    .banner {
      position: absolute;

      top: 25%; /* ⬅️ higher */
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 120px 220px; /* ⬅️ MUCH bigger */

      border: 6px solid black;
      border-radius: 35px;

      font-size: 120px; /* ⬅️ way bigger text */
      font-weight: bold;

      text-align: center;

      z-index: 5;

      /* IMPORTANT: no new colors added, just using same pink feel */
      background-color: rgba(255, 143, 177, 0.95);
      color: black;
    }

  </style>
</head>

<body>

  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <img src="statiktitle.png">

    <div class="banner">
      COMING SOON!!
    </div>

  </div>

</body>
</html>
