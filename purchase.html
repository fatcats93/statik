<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    * {
      font-family: Arial, sans-serif !important;
      -webkit-text-size-adjust: 100%;
    }

    .header {
      width: 100%;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
      position: relative;
      z-index: 50;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 40px auto 0;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 140vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      z-index: 10;
      margin-top: -200px;
    }

    .hero img {
      width: 112%;
      height: 112%;
      object-fit: contain;
      position: relative;
      z-index: 10;
    }

    .banner {
      position: absolute;
      top: -500px;
      left: 50%;
      transform: translateX(-50%);

      width: 100%;
      padding: 80px 0;

      border-top: 6px solid black;
      border-bottom: 6px solid black;

      font-size: 140px;
      font-weight: bold;
      text-align: center;

      background-color: rgba(255, 143, 177, 0.95);
      color: black;

      z-index: 20;
    }

    /* ========================= */
    /* RESPONSIVE FIX */
    /* ========================= */

    @media screen and (max-width: 1024px) {

      .header {
        flex-wrap: wrap;
        padding: 25px 10px;
        gap: 15px;
      }

      .header a {
        font-size: 28px;
      }

      .title {
        width: 95%;
        margin: 20px auto 0;
      }

      .hero {
        height: auto;
        margin-top: 0;
        padding: 60px 0;
      }

      .hero img {
        width: 95%;
        height: auto;
      }

      .banner {
        top: -120px;
        font-size: 28px;
        padding: 30px 10px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="hero">

    <div class="banner">
      COMING SOON!!
    </div>

    <img src="statiktitle.png">

  </div>

</body>
</html>
