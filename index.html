<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* FULL SCREEN SECTIONS */
    .section {
      background-color: #ff8fb1;
      width: 94%;
      max-width: 1400px;
      margin: 80px auto;
      border-radius: 40px;
      padding: 120px;
    }

    /* HEADER (bigger + more spaced) */
    .header {
      display: flex;
      justify-content: center;
      gap: 100px;
      border-bottom: 5px solid black;
      padding-bottom: 30px;
    }

    .header a {
      text-decoration: none;
      font-size: 52px;
      color: black;
      font-weight: bold;
    }

    /* HERO TITLE — BIG BILLBOARD STYLE */
    .title {
      width: 95%;
      max-width: 1300px;
      display: block;
      margin: 100px auto;
    }

    /* MISSION = FULL SCREEN HERO SECTION */
    .mission {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      font-size: 88px;
      font-family: cursive;
      padding: 80px;
    }

    /* ISSUE SECTION = ALSO HUGE */
    .issue-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 100px;
    }

    .issue-text {
      font-size: 96px;
      font-family: cursive;
      line-height: 1.1;
    }

    .issue-image {
      width: 420px;
      border: 4px solid black;
      border-radius: 20px;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .header {
        flex-wrap: wrap;
        gap: 30px;
      }

      .header a {
        font-size: 30px;
      }

      .mission {
        font-size: 48px;
        min-height: 70vh;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 52px;
      }

      .issue-image {
        width: 80%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- HERO -->
  <img src="hometitle1.jpg" class="title">

  <!-- FULL SCREEN MISSION -->
  <div class="section mission">
    Mission Statement
  </div>

  <!-- FULL SCREEN FEATURE -->
  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
