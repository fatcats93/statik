<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* SECTIONS — BIGGER + more dominant */
    .section {
      background-color: #ff8fb1;
      margin: 20px auto;          /* tighter spacing overall */
      width: 98%;
      max-width: 1900px;
      border-radius: 55px;
      padding: 200px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      gap: 140px;
      border-bottom: 7px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE — BIGGER */
    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 160px auto 0;
    }

    /* THIS PULLS EVERYTHING UP HARD INTO TITLE */
    .content-shift {
      margin-top: -320px; /* 🔥 MUCH higher overlap */
      position: relative;
      z-index: 2;
    }

    /* MISSION — BIGGER BLOCK */
    .mission {
      text-align: center;
      font-size: 150px;
      font-family: cursive;
      padding: 220px 120px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 180px;
      margin-top: 60px;
    }

    .issue-text {
      font-size: 170px;
      font-family: cursive;
      line-height: 1;
    }

    .issue-image {
      width: 700px;
      border: 6px solid black;
      border-radius: 30px;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .header a {
        font-size: 42px;
      }

      .section {
        padding: 90px;
      }

      .content-shift {
        margin-top: -120px;
      }

      .mission {
        font-size: 80px;
        padding: 100px;
      }

      .issue-text {
        font-size: 90px;
      }

      .issue-image {
        width: 85%;
      }
    }
  </style>
</head>

<body>

  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="content-shift">

    <div class="section mission">
      Mission Statement
    </div>

    <div class="section issue-section">
      <div class="issue-text">
        First Issue Ready!
      </div>

      <img src="statiktitle.png" class="issue-image">
    </div>

  </div>

</body>
</html>
