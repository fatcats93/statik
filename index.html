<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* TITLE */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    /* BUTTONS */
    .nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      max-width: 1600px;

      margin: -480px auto 0;
      position: relative;
      z-index: 2;
    }

    .nav a {
      width: 18%;
      display: block;
    }

    .nav img {
      width: 100%;
      display: block;
    }

    /* FIXED CONTAINER */
    .container {
      position: relative;
      width: 100%;        /* 🔥 FIXED (no more fit-content bug) */
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    /* BIGGER IMAGE */
    .main-image {
      width: 75%;        /* 🔥 bigger */
      max-width: 900px;
      display: block;
    }

    /* STARS */
    .star {
      position: absolute;
      width: 160px;      /* 🔥 bigger stars */
    }

    /* TOP STAR */
    .star-top {
      top: -60px;
      left: 10%;
    }

    /* BOTTOM STAR */
    .star-bottom {
      bottom: -60px;
      right: 10%;
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        gap: 20px;
        margin-top: -300px;
      }

      .nav a {
        width: 48%;
      }

      .main-image {
        width: 90%;
      }

      .star {
        width: 100px;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- BUTTONS -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
    <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
    <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
  </div>

  <!-- IMAGE + STARS -->
  <div class="container">

    <img src="statiktitle.png" alt="STATIK" class="main-image">

    <img src="1star.jpeg" class="star star-top">
    <img src="comingstar.jpeg" class="star star-bottom">

  </div>

</body>
</html>
