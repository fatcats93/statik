<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* TITLE */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    /* BUTTON ROW */
    .nav {
      display: flex;
      justify-content: space-between; /* keeps spacing clean */
      align-items: center;
      width: 95%;
      max-width: 1600px;

      margin: -480px auto 0;
      position: relative;
      z-index: 2;
      gap: 10px; /* prevents touching */
    }

    /* BIG BUTTONS — scale safely */
    .nav a {
      flex: 1;              /* makes them grow evenly */
      max-width: 240px;     /* prevents going off screen */
      min-width: 120px;     /* prevents shrinking too much */
      display: block;
    }

    .nav img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* IMAGE — SMALLER NOW */
    .subtitle {
      width: 65%;           /* reduced size */
      max-width: 800px;
      display: block;

      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        margin-top: -300px;
        gap: 15px;
      }

      .nav a {
        flex: 1 1 45%;
        max-width: none;
      }

      .subtitle {
        width: 85%;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- BUTTONS -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
    <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
    <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
  </div>

  <!-- IMAGE (smaller now) -->
  <img src="statiktitle.png" alt="STATIK Subtitle" class="subtitle">

</body>
</html>
