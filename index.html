<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* LIGHT PINK SECTIONS */
    .section {
      background-color: #ff8fb1;
      margin: 20px auto;
      width: 85%;
      max-width: 1100px;
      border-radius: 20px;
      padding: 20px;
    }

    /* HEADER (BIGGER) */
    .header {
      display: flex;
      justify-content: center;
      gap: 60px;              /* more space between buttons */
      padding: 30px 20px;     /* taller header */
      border-bottom: 3px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 26px;        /* bigger text */
      color: black;
      font-weight: bold;
    }

    /* TITLE IMAGE */
    .title {
      width: 75%;
      max-width: 1000px;
      display: block;
      margin: 30px auto;
    }

    /* MISSION */
    .mission {
      text-align: center;
      font-size: 30px;
      font-family: cursive;
      padding: 50px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
    }

    .issue-text {
      font-size: 42px;
      font-family: cursive;
    }

    .issue-image {
      width: 260px;
      border: 2px solid black;
    }

    @media (max-width: 800px) {
      .header {
        flex-wrap: wrap;
        gap: 20px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-image {
        width: 70%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE IMAGE -->
  <img src="hometitle1.jpg" class="title">

  <!-- MISSION -->
  <div class="section mission">
    Mission Statement
  </div>

  <!-- FIRST ISSUE -->
  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
