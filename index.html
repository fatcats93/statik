<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* SECTIONS — more “full-page flow” style */
    .section {
      background-color: #ff8fb1;
      margin: 50px auto;
      width: 94%;
      max-width: 1400px;
      border-radius: 35px;
      padding: 80px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      gap: 70px;
      border-bottom: 4px solid black;
      padding-bottom: 20px;
    }

    .header a {
      text-decoration: none;
      font-size: 38px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 92%;
      max-width: 1200px;
      display: block;
      margin: 40px auto 70px;
    }

    /* MISSION — big hero feel */
    .mission {
      text-align: center;
      font-size: 56px;
      font-family: cursive;
      padding: 110px 70px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 60px;
    }

    .issue-text {
      font-size: 72px;
      font-family: cursive;
    }

    .issue-image {
      width: 320px;
      border: 3px solid black;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .header {
        flex-wrap: wrap;
        gap: 25px;
      }

      .header a {
        font-size: 24px;
      }

      .mission {
        font-size: 36px;
        padding: 60px 30px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 46px;
      }

      .issue-image {
        width: 70%;
      }
    }
  </style>
</head>

<body>

  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="section mission">
    Mission Statement
  </div>

  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
