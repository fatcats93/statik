<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* FULL WIDTH SECTIONS */
    .section {
      background-color: #ff8fb1;
      width: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      gap: 120px;
      border-bottom: 6px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 48px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 100%;
      display: block;
    }

    .title-wrapper {
      padding: 40px 0;
    }

    /* MISSION */
    .mission {
      text-align: center;
      font-size: 80px;
      font-family: cursive;
      padding: 120px 40px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 100px;
    }

    .issue-text {
      font-size: 100px;
      font-family: cursive;
    }

    .issue-image {
      width: 600px;
      border: 5px solid black;
    }

    @media (max-width: 1000px) {
      .header {
        flex-wrap: wrap;
        gap: 40px;
      }

      .header a {
        font-size: 28px;
      }

      .mission {
        font-size: 40px;
        padding: 60px 20px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 60px;
      }

      .issue-image {
        width: 80%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE -->
  <div class="title-wrapper">
    <img src="hometitle1.jpg" class="title">
  </div>

  <!-- MISSION -->
  <div class="section mission">
    Mission Statement
  </div>

  <!-- ISSUE -->
  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
