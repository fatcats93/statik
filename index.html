<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* WRAP EVERYTHING FOR CONTROL */
    .header {
      position: relative;
      padding-top: 0;
    }

    /* TITLE */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 0 auto;
      position: relative;
      z-index: 3;
    }

    /* NAV — FORCED WAY UP INTO TITLE */
    .nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      max-width: 1600px;

      position: relative;
      margin-top: -80px; /* 🔥 BIG MOVE UP */
      z-index: 4;
    }

    .nav a {
      width: 18%;
      display: block;
    }

    .nav img {
      width: 100%;
      display: block;
    }

    /* SUBTITLE — ALSO PUSHED WAY UP */
    .subtitle {
      width: 95%;
      max-width: 1300px;
      display: block;

      position: relative;
      margin-top: -70px; /* 🔥 BIG MOVE UP */
      z-index: 2;
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        gap: 20px;
        margin-top: -40px;
      }

      .nav a {
        width: 48%;
      }

      .subtitle {
        margin-top: -40px;
      }
    }
  </style>
</head>

<body>

  <div class="header">

    <!-- TITLE -->
    <img src="hometitle1.jpg" alt="STATIK" class="title">

    <!-- NAV -->
    <div class="nav">
      <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
      <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
      <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
      <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
      <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
    </div>

    <!-- SUBTITLE -->
    <img src="statiktitle.png" alt="STATIK Subtitle" class="subtitle">

  </div>

</body>
</html>
