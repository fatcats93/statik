<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* TITLE */
    .title {
      width: 80%;
      max-width: 1000px;
      display: block;
      margin: 20px auto 0;
      position: relative;
      z-index: 2;
    }

    /* BUTTONS */
    .nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: -480px auto 20px;
      position: relative;
      z-index: 3;
    }

    .nav a {
      width: 140px;
    }

    .nav img {
      width: 100%;
    }

    /* IMAGE AREA */
    .container {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    /* BIG IMAGE — NOW FILLS SCREEN NICELY */
    .main-image {
      width: 60vw;          /* 🔥 responsive + big */
      max-width: 900px;
      min-width: 400px;
      display: block;
    }

    /* STARS */
    .star {
      position: absolute;
      width: 180px;        /* 🔥 bigger */
      mix-blend-mode: multiply; /* helps remove gray */
    }

    /* TOP LEFT STAR */
    .star1 {
      top: 5%;
      left: 15%;
    }

    /* RIGHT STAR */
    .star2 {
      bottom: 10%;
      right: 18%;
    }

    /* SMALL STAR NEAR IMAGE */
    .star3 {
      top: 35%;
      right: 22%;
      width: 120px;
    }

    /* BOTTOM LEFT */
    .star4 {
      bottom: 5%;
      left: 20%;
      width: 130px;
    }

    @media (max-width: 900px) {
      .main-image {
        width: 85vw;
      }

      .star {
        width: 100px;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" class="title">

  <!-- BUTTONS -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg"></a>
    <a href="mission.html"><img src="missionbutt.jpg"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg"></a>
    <a href="contact.html"><img src="contactbutt.jpg"></a>
  </div>

  <!-- IMAGE + STARS -->
  <div class="container">

    <img src="statiktitle.png" class="main-image">

    <!-- STARS ATTACHED TO IMAGE AREA -->
    <img src="1star.jpeg" class="star star1">
    <img src="comingstar.jpeg" class="star star2">

  </div>

</body>
</html>
