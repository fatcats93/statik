<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* SECTIONS */
    .section {
      background-color: #ff8fb1;
      margin: 40px auto;
      width: 96%;
      max-width: 1700px;
      border-radius: 45px;
      padding: 160px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      gap: 140px;
      border-bottom: 7px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE — BIGGER */
    .title {
      width: 100%;
      max-width: 2800px;
      display: block;
      margin: 160px auto 0;
    }

    /* WRAPPER SHIFT — moves BOTH sections up together */
    .content-shift {
      margin-top: -180px; /* this is the key overlap control */
      position: relative;
      z-index: 2;
    }

    /* MISSION */
    .mission {
      text-align: center;
      font-size: 120px;
      font-family: cursive;
      padding: 180px 100px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 160px;
      margin-top: 40px; /* keeps internal spacing intact */
    }

    .issue-text {
      font-size: 140px;
      font-family: cursive;
      line-height: 1;
    }

    .issue-image {
      width: 600px;
      border: 6px solid black;
      border-radius: 25px;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .header {
        flex-wrap: wrap;
        gap: 50px;
      }

      .header a {
        font-size: 42px;
      }

      .title {
        max-width: 1600px;
      }

      .content-shift {
        margin-top: -80px;
      }

      .mission {
        font-size: 70px;
        padding: 90px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 80px;
      }

      .issue-image {
        width: 85%;
      }
    }
  </style>
</head>

<body>

  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- BIG TITLE -->
  <img src="hometitle1.jpg" class="title">

  <!-- THIS BLOCK MOVES UP INTO TITLE -->
  <div class="content-shift">

    <div class="section mission">
      Mission Statement
    </div>

    <div class="section issue-section">
      <div class="issue-text">
        First Issue Ready!
      </div>

      <img src="statiktitle.png" class="issue-image">
    </div>

  </div>

</body>
</html>
