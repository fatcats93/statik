<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398; /* main background */
      font-family: Arial, sans-serif;
    }

    /* LIGHT PINK BLOCK STYLE */
    .section {
      background-color: #ff8fb1; /* light pink */
      margin: 20px auto;
      width: 85%;
      max-width: 1100px;
      border-radius: 20px;
      padding: 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      gap: 40px;
      border-bottom: 2px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 20px;
      color: black;
      font-weight: bold;
    }

    /* TITLE (HTML FILE) */
    .title {
      display: block;
      width: 100%;
      height: 150px;
      border: none;
      margin: 20px auto;
    }

    /* MISSION */
    .mission {
      text-align: center;
      font-size: 28px;
      font-family: cursive;
      padding: 40px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
    }

    .issue-text {
      font-size: 40px;
      font-family: cursive;
    }

    .issue-image {
      width: 250px;
      border: 2px solid black;
    }

    @media (max-width: 800px) {
      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-image {
        width: 70%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE (HTML FILE) -->
  <iframe src="statiktitle.html" class="title"></iframe>

  <!-- MISSION -->
  <div class="section mission">
    Mission Statement
  </div>

  <!-- FIRST ISSUE -->
  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
