<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* TITLE — pull it upward + reduce spacing */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 10px auto 0; /* was 30px → NOW MUCH HIGHER */
    }

    /* NAV — directly under title, no gap */
    .nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      max-width: 1600px;

      margin: 0 auto 0; /* REMOVE bottom gap */
    }

    .nav a {
      width: 18%;
      display: block;
    }

    .nav img {
      width: 100%;
      display: block;
    }

    /* SUBTITLE / BOOK IMAGE — pull it UP closer */
    .subtitle {
      width: 95%;
      max-width: 1300px;
      display: block;
      margin: 0 auto; /* removes extra spacing */
      margin-top: -10px; /* pulls it upward closer to buttons */
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        gap: 20px;
      }

      .nav a {
        width: 48%;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- MENU RIGHT UNDER TITLE -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
    <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
    <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
  </div>

  <!-- IMAGE UNDER MENU -->
  <img src="statiktitle.png" alt="STATIK Subtitle" class="subtitle">

</body>
</html>
