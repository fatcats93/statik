<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Statik</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ff7aa2;
      color: black;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid black;
      padding: 10px 20px;
      font-size: 18px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      text-decoration: none;
      color: black;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    /* TITLE */
    .title {
      display: flex;
      justify-content: center;
      margin: 40px 0;
    }

    .title img {
      width: 80%;
      max-width: 800px;
    }

    /* MISSION */
    .mission {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .mission-box {
      border: 2px solid black;
      border-radius: 60px;
      padding: 40px;
      width: 70%;
      text-align: center;
      font-size: 24px;
    }

    /* ISSUE SECTION */
    .issue {
      border-top: 2px solid black;
      margin-top: 60px;
      padding: 40px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .issue-text {
      font-size: 28px;
    }

    .issue-box {
      width: 250px;
      height: 320px;
      border: 2px solid black;
      background: white;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-left">
      <span>⭐</span>
      <span>Home</span>
    </div>

    <div class="nav-links">
      <a href="purchase.html">Purchase</a>
      <a href="submitart.html">Submit</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <!-- TITLE IMAGE -->
  <div class="title">
    <img src="statiktitle.png" alt="Statik Title">
  </div>

  <!-- MISSION -->
  <div class="mission">
    <div class="mission-box">
      Mission Statement
    </div>
  </div>

  <!-- ISSUE -->
  <div class="issue">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <div class="issue-box"></div>
  </div>

</body>
</html>
