<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* TITLE */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    /* BUTTONS (your high position kept) */
    .nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      max-width: 1600px;

      margin: -480px auto 0;
      position: relative;
      z-index: 2;
    }

    .nav a {
      width: 18%;
      display: block;
    }

    .nav img {
      width: 100%;
      display: block;
    }

    /* IMAGE + STARS WRAPPER */
    .container {
      position: relative;
      width: fit-content;
      margin: 0 auto;
    }

    /* MAIN IMAGE (smaller now) */
    .main-image {
      width: 65%;
      max-width: 700px;
      display: block;
      margin: 20px auto 60px;
    }

    /* STARS */
    .star {
      position: absolute;
      width: 120px;
    }

    /* TOP STAR */
    .star-top {
      top: -40px;
      left: -60px;
    }

    /* BOTTOM STAR */
    .star-bottom {
      bottom: -40px;
      right: -60px;
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        gap: 20px;
        margin-top: -300px;
      }

      .nav a {
        width: 48%;
      }

      .main-image {
        width: 85%;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- BUTTONS -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
    <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
    <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
  </div>

  <!-- IMAGE + STARS -->
  <div class="container">

    <!-- MAIN IMAGE -->
    <img src="statiktitle.png" alt="STATIK" class="main-image">

    <!-- TOP STAR -->
    <img src="1star.jpeg" class="star star-top">

    <!-- BOTTOM STAR -->
    <img src="comingstar.jpeg" class="star star-bottom">

  </div>

</body>
</html>
