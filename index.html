<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* BIGGER SECTIONS (almost full width) */
    .section {
      background-color: #ff8fb1;
      margin: 30px auto;
      width: 95%;              /* 🔥 was 85% */
      max-width: 1400px;       /* 🔥 bigger cap */
      border-radius: 25px;
      padding: 40px;           /* 🔥 more space inside */
    }

    /* HEADER — MUCH BIGGER */
    .header {
      display: flex;
      justify-content: center;
      gap: 80px;               /* 🔥 more spacing */
      padding: 40px 20px;
      border-bottom: 4px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 32px;         /* 🔥 bigger text */
      color: black;
      font-weight: bold;
    }

    /* TITLE — BIGGER */
    .title {
      width: 90%;              /* 🔥 fills more screen */
      max-width: 1300px;
      display: block;
      margin: 40px auto;
    }

    /* MISSION — BIGGER */
    .mission {
      text-align: center;
      font-size: 42px;         /* 🔥 bigger text */
      font-family: cursive;
      padding: 70px;
    }

    /* ISSUE SECTION */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 60px;
    }

    .issue-text {
      font-size: 60px;         /* 🔥 BIG headline */
      font-family: cursive;
    }

    .issue-image {
      width: 350px;            /* 🔥 bigger image */
      border: 3px solid black;
    }

    @media (max-width: 900px) {
      .header {
        flex-wrap: wrap;
        gap: 25px;
      }

      .header a {
        font-size: 22px;
      }

      .mission {
        font-size: 28px;
        padding: 40px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 40px;
      }

      .issue-image {
        width: 80%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE -->
  <img src="hometitle1.jpg" class="title">

  <!-- MISSION -->
  <div class="section mission">
    Mission Statement
  </div>

  <!-- FIRST ISSUE -->
  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
