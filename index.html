<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* SECTIONS — bigger, but still structured */
    .section {
      background-color: #ff8fb1;
      margin: 70px auto;
      width: 95%;
      max-width: 1600px;
      border-radius: 40px;
      padding: 120px;
    }

    /* HEADER — MUCH bigger nav */
    .header {
      display: flex;
      justify-content: center;
      gap: 120px;
      border-bottom: 6px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 60px;
      color: black;
      font-weight: bold;
    }

    /* TITLE — BIG hero scale */
    .title {
      width: 98%;
      max-width: 1500px;
      display: block;
      margin: 80px auto;
    }

    /* MISSION — giant centered block */
    .mission {
      text-align: center;
      font-size: 96px;
      font-family: cursive;
      padding: 140px;
    }

    /* ISSUE SECTION — expanded layout */
    .issue-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 120px;
    }

    .issue-text {
      font-size: 110px;
      font-family: cursive;
      line-height: 1.1;
    }

    .issue-image {
      width: 500px;
      border: 5px solid black;
    }

    /* MOBILE (scaled properly) */
    @media (max-width: 900px) {
      .header {
        flex-wrap: wrap;
        gap: 40px;
      }

      .header a {
        font-size: 34px;
      }

      .mission {
        font-size: 56px;
        padding: 70px;
      }

      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-text {
        font-size: 64px;
      }

      .issue-image {
        width: 80%;
      }
    }
  </style>
</head>

<body>

  <div class="section header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="section mission">
    Mission Statement
  </div>

  <div class="section issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
