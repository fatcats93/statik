<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* HEADER BAR */
    .header {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px 0;
      border-bottom: 2px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 20px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 70%;
      max-width: 900px;
      display: block;
      margin: 30px auto;
    }

    /* MISSION SECTION */
    .mission {
      width: 70%;
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      border: 3px solid black;
      border-radius: 50px;
      text-align: center;
      font-size: 28px;
      font-family: cursive;
    }

    /* FIRST ISSUE SECTION */
    .issue-section {
      width: 80%;
      max-width: 1000px;
      margin: 50px auto;
      padding: 30px;
      border-top: 2px solid black;
      border-bottom: 2px solid black;

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
    }

    .issue-text {
      font-size: 40px;
      font-family: cursive;
    }

    .issue-image {
      width: 250px;
      height: auto;
      border: 2px solid black;
    }

    @media (max-width: 800px) {
      .issue-section {
        flex-direction: column;
        text-align: center;
      }

      .issue-image {
        width: 70%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE IMAGE -->
  <img src="statiktitle.png" class="title">

  <!-- MISSION -->
  <div class="mission">
    Mission Statement
  </div>

  <!-- FIRST ISSUE -->
  <div class="issue-section">
    <div class="issue-text">
      First Issue Ready!
    </div>

    <img src="statiktitle.png" class="issue-image">
  </div>

</body>
</html>
