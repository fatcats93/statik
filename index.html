<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
    }

    /* TITLE stays the same */
    .title {
      width: 85%;
      max-width: 1100px;
      display: block;
      margin: 10px auto 0;
      position: relative;
      z-index: 1;
    }

    /* BUTTONS — pushed MUCH higher */
    .nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      max-width: 1600px;

      margin: -120px auto 0; /* 🔥 BIGGER UP SHIFT */
      position: relative;
      z-index: 2;
    }

    .nav a {
      width: 18%;
      display: block;
    }

    .nav img {
      width: 100%;
      display: block;
    }

    /* IMAGE — keeps SAME spacing under buttons */
    .subtitle {
      width: 95%;
      max-width: 1300px;
      display: block;

      margin: 10px auto 0; /* stays consistent with nav */
      position: relative;
      z-index: 1;
    }

    @media (max-width: 900px) {
      .nav {
        flex-wrap: wrap;
        gap: 20px;
        margin-top: -70px; /* also shifted up on mobile */
      }

      .nav a {
        width: 48%;
      }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- BUTTONS -->
  <div class="nav">
    <a href="index.html"><img src="homebutt.jpg" alt="Home"></a>
    <a href="mission.html"><img src="missionbutt.jpg" alt="Mission"></a>
    <a href="purchase.html"><img src="purchasebutt.jpg" alt="Purchase"></a>
    <a href="submitart.html"><img src="submitartbutt.jpg" alt="Submit Art"></a>
    <a href="contact.html"><img src="contactbutt.jpg" alt="Contact"></a>
  </div>

  <!-- IMAGE -->
  <img src="statiktitle.png" alt="STATIK Subtitle" class="subtitle">

</body>
</html>
