<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK - Submit Art</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      color: #000;
    }

    /* HEADER */
    .header {
      width: 100%;
      margin: 0;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
      position: relative;
      z-index: 10;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 100%;
      max-width: 2600px;
      display: block;
      margin: 140px auto 0;
      position: relative;
      z-index: 1;
    }

    /* SUBMIT BOX — BIG + HIGH */
    .submitart-container {
      background-color: #ffc0cb;

      max-width: 1900px;
      margin: -700px auto 120px;
      padding: 240px;

      border-radius: 50px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);

      text-align: center;

      position: relative;
      z-index: 20;
    }

    .submitart-container h1 {
      font-size: 8rem;
      margin-top: 0;
    }

    .submitart-container p {
      font-size: 2.8rem;
      line-height: 1.6;
      margin-bottom: 30px; /* tighter so button moves up */
    }

    /* 🔥 BIG BUTTON — NEAR BOX EDGE */
    .submit-button {
      background-color: #ff6398;
      color: #fff;
      border: none;

      padding: 60px 110px; /* BIGGER */
      font-size: 3.4rem;   /* BIG TEXT */

      border-radius: 25px;
      cursor: pointer;

      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;

      margin-top: 10px; /* pulls it closer to text/box bottom */
    }

    .submit-button:hover {
      background-color: #ff4d82;
    }

    @media (max-width: 900px) {
      .header a {
        font-size: 42px;
      }

      .submitart-container {
        margin: -280px auto 80px;
        padding: 70px;
      }

      .submitart-container h1 {
        font-size: 3.5rem;
      }

      .submitart-container p {
        font-size: 1.4rem;
      }

      .submit-button {
        font-size: 1.6rem;
        padding: 25px 40px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- SUBMIT ART BOX -->
  <div class="submitart-container">
    <h1>Submit Your Art</h1>

    <p>
      We love showcasing young artists! Submit your artwork by clicking the button below.  
      You’ll be taken to our Google Form where you can upload your art and include your name and a short description.
    </p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSecLsMX6Z_MhrE-QKmYr2vRPBtyQUVR3ochw9dc3-YyN-E7_g/viewform?usp=publish-editor" 
       target="_blank" class="submit-button">
       Submit Your Art
    </a>
  </div>

</body>
</html>
