<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATIK - Submit Art</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      color: #000;
      overflow-x: hidden;
    }

    * {
      font-family: Arial, sans-serif !important;
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
    }

    /* HEADER */
    .header {
      width: 100%;
      margin: 0;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
      position: relative;
      z-index: 10;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 100%;
      max-width: 2600px;
      display: block;
      margin: 140px auto 0;
      position: relative;
      z-index: 1;
    }

    /* SUBMIT BOX */
    .submitart-container {
      background-color: #ffc0cb;

      max-width: 1900px;
      margin: -700px auto 120px;
      padding: 240px;

      border-radius: 50px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);

      text-align: center;

      position: relative;
      z-index: 20;

      width: 95%;
    }

    .submitart-container h1 {
      font-size: 8rem;
      margin-top: 0;
    }

    .submitart-container p {
      font-size: 2.8rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .submit-button {
      background-color: #ff6398;
      color: #fff;
      border: none;

      padding: 60px 110px;
      font-size: 3.4rem;

      border-radius: 25px;
      cursor: pointer;

      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;

      margin-top: 10px;
    }

    .submit-button:hover {
      background-color: #ff4d82;
    }

    /* ========================= */
    /* RESPONSIVE FIX */
    /* ========================= */

    @media screen and (max-width: 1024px) {

      .header {
        flex-wrap: wrap;
        padding: 25px 10px;
        gap: 15px;
      }

      .header a {
        font-size: 28px;
      }

      .title {
        width: 95%;
        margin: 40px auto 0;
      }

      .submitart-container {
        margin: -120px auto 60px;
        padding: 40px 25px;
        border-radius: 25px;
        width: 92%;
      }

      .submitart-container h1 {
        font-size: 3rem;
      }

      .submitart-container p {
        font-size: 1.2rem;
        line-height: 1.7;
      }

      .submit-button {
        font-size: 1.3rem;
        padding: 20px 35px;
        width: 100%;
        max-width: 350px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <div class="submitart-container">

    <h1>Submit Your Art</h1>

    <p>
      We love showcasing young artists! Submit your artwork by clicking the button below.
      You’ll be taken to our Google Form where you can upload your art and include your
      name and a short description.
    </p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSecLsMX6Z_MhrE-QKmYr2vRPBtyQUVR3ochw9dc3-YyN-E7_g/viewform?usp=publish-editor"
       target="_blank"
       class="submit-button">
       Submit Your Art
    </a>

  </div>

</body>
</html>
