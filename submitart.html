<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK - Submit Art</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      color: #000;
    }

    /* HEADER */
    .header {
      width: 100%;
      margin: 0;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
      position: relative;
      z-index: 10;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE (BEHIND) */
    .title {
      width: 100%;
      max-width: 2600px;
      display: block;
      margin: 140px auto 0;

      position: relative;
      z-index: 1; /* stays behind box */
    }

    /* 🔥 SUBMIT BOX — HIGHER + ON TOP */
    .submitart-container {
      background-color: #ffc0cb;

      max-width: 1600px;

      margin: -520px auto 120px; /* 🔥 MUCH higher now */
      padding: 160px;

      border-radius: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);

      text-align: center;

      position: relative;
      z-index: 20; /* 🔥 FORCES IT ON TOP OF TITLE */
    }

    .submitart-container h1 {
      font-size: 6rem;
      margin-top: 0;
    }

    .submitart-container p {
      font-size: 2.2rem;
      line-height: 1.6;
      margin-bottom: 50px;
    }

    .submit-button {
      background-color: #ff6398;
      color: #fff;
      border: none;
      padding: 30px 55px;
      font-size: 2rem;
      border-radius: 15px;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .submit-button:hover {
      background-color: #ff4d82;
    }

    @media (max-width: 900px) {
      .header a {
        font-size: 42px;
      }

      .submitart-container {
        margin: -220px auto 80px;
        padding: 60px;
      }

      .submitart-container h1 {
        font-size: 3rem;
      }

      .submitart-container p {
        font-size: 1.3rem;
      }

      .submit-button {
        font-size: 1.2rem;
        padding: 18px 30px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- TITLE -->
  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <!-- SUBMIT ART BOX (NOW HIGH + ON TOP) -->
  <div class="submitart-container">
    <h1>Submit Your Art</h1>

    <p>
      We love showcasing young artists! Submit your artwork by clicking the button below.  
      You’ll be taken to our Google Form where you can upload your art and include your name and a short description.
    </p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSecLsMX6Z_MhrE-QKmYr2vRPBtyQUVR3ochw9dc3-YyN-E7_g/viewform?usp=publish-editor" 
       target="_blank" class="submit-button">
       Submit Your Art
    </a>
  </div>

</body>
</html>
