<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STATIK Purchase</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    * {
      font-family: Arial, sans-serif !important;
      box-sizing: border-box;
    }

    .header {
      width: 100%;
      background-color: #ff8fb1;
      padding: 60px 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-bottom: 7px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 40px auto 0;
    }

    /* BIG FULL HERO SPACE */
    .purchase-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 120px;
      padding: 100px 60px;
      height: 75vh;
    }

    /* HUGE BUTTONS */
    .purchase-btn {
      width: 650px;
      height: 450px;

      background-color: #ff8fb1;
      border: 8px solid black;
      border-radius: 80px;

      display: flex;
      justify-content: center;
      align-items: center;

      text-decoration: none;
      color: black;

      font-weight: bold;
      font-size: 84px;
      text-align: center;
      line-height: 1.1;

      padding: 20px;

      transition: 0.2s ease;
    }

    .purchase-btn:hover {
      transform: scale(1.05);
    }

    /* MOBILE */
    @media screen and (max-width: 1024px) {

      .header {
        flex-wrap: wrap;
        padding: 25px 10px;
        gap: 15px;
      }

      .header a {
        font-size: 28px;
      }

      .title {
        width: 95%;
      }

      .purchase-container {
        flex-direction: column;
        height: auto;
        gap: 40px;
        padding: 60px 20px;
      }

      .purchase-btn {
        width: 95%;
        height: 260px;
        font-size: 52px;
        border-radius: 60px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="purchase-container">

    <a 
      class="purchase-btn" 
      href="https://veronique826.gumroad.com/l/nautxo"
      target="_blank"
    >
      Physical Copy ($10)
    </a>

    <a 
      class="purchase-btn" 
      href="PUT_DIGITAL_LINK_HERE"
      target="_blank"
    >
      Digital Copy ($5)
    </a>

  </div>

</body>
</html>
