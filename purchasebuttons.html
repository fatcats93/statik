<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STATIK Purchase</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    * {
      font-family: Arial, sans-serif !important;
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
    }

    .header {
      width: 100%;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 40px auto 0;
    }

    .purchase-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;

      gap: 40px;

      padding: 30px 40px 60px 40px;

      height: 75vh;
    }

    .purchase-btn {
      flex: 1;
      height: 100%;

      text-decoration: none;
      background-color: #ff8fb1;
      color: black;

      border: 6px solid black;
      border-radius: 20px;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding-top: 120px;

      font-size: 72px;
      font-weight: bold;
      text-align: center;

      transition: 0.2s ease;
    }

    .purchase-btn:hover {
      transform: scale(1.02);
    }

    @media screen and (max-width: 1024px) {

      .header {
        flex-wrap: wrap;
        padding: 25px 10px;
        gap: 15px;
      }

      .header a {
        font-size: 28px;
      }

      .title {
        width: 95%;
      }

      .purchase-container {
        flex-direction: column;
        height: auto;
        gap: 25px;
        padding: 20px;
      }

      .purchase-btn {
        width: 100%;
        height: 320px;

        font-size: 38px;

        padding-top: 70px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="purchase-container">

    <a 
      class="purchase-btn" 
      href="https://veronique826.gumroad.com/l/nautxo"
      target="_blank"
    >
      Physical Copy ($10)
    </a>

    <a 
      class="purchase-btn" 
      href="PUT_DIGITAL_LINK_HERE"
      target="_blank"
    >
      Digital Copy ($5)
    </a>

  </div>

</body>
</html>
