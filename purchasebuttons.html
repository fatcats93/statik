<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STATIK Purchase</title>

  <style>

    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    * {
      font-family: Arial, sans-serif !important;
      box-sizing: border-box;
    }

    .header {
      width: 100%;
      background-color: #ff8fb1;
      padding: 60px 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-bottom: 7px solid black;
      position: relative;
      z-index: 10;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    .title {
      width: 100%;
      max-width: 3000px;
      display: block;
      margin: 0; /* REMOVE GAP COMPLETELY */
    }

    /* 🔥 MAX POSSIBLE OVERLAP (REAL VERSION) */
    .purchase-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 220px;

      padding: 0 80px;

      /* only slight controlled overlap */
      margin-top: -120px;

      position: relative;
      z-index: 50;
    }

    .purchase-btn {
      width: 1400px;
      height: 1000px;

      background-color: #ff8fb1;
      border: 16px solid black;
      border-radius: 220px;

      display: flex;
      justify-content: center;
      align-items: center;

      text-decoration: none;
      color: black;

      font-weight: bold;
      font-size: 170px;
      text-align: center;
      line-height: 1.05;

      padding: 40px;

      transition: 0.2s ease;
    }

    .purchase-btn:hover {
      transform: scale(1.05);
    }

    @media screen and (max-width: 1024px) {

      .header {
        flex-wrap: wrap;
        padding: 25px 10px;
        gap: 15px;
      }

      .header a {
        font-size: 28px;
      }

      .purchase-container {
        flex-direction: column;
        gap: 80px;
        margin-top: -40px;
        padding: 20px;
      }

      .purchase-btn {
        width: 95%;
        height: 420px;
        font-size: 78px;
        border-radius: 140px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" class="title">

  <div class="purchase-container">

    <a 
      class="purchase-btn" 
      href="https://veronique826.gumroad.com/l/nautxo"
      target="_blank"
    >
      Physical Copy ($10)
    </a>

    <a 
      class="purchase-btn" 
      href="read.html"
      target="_blank"
    >
      Digital Copy ($5)
    </a>

  </div>

</body>
</html>
