<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATIK - Contact</title>

  <style>
    body {
      margin: 0;
      background-color: #ff6398;
      font-family: Arial, sans-serif;
      color: #000;
    }

    /* HEADER */
    .header {
      width: 100%;
      margin: 0;
      background-color: #ff8fb1;
      padding: 60px 0;

      display: flex;
      justify-content: space-around;
      align-items: center;

      border-bottom: 7px solid black;
      position: relative;
      z-index: 10;
    }

    .header a {
      text-decoration: none;
      font-size: 74px;
      color: black;
      font-weight: bold;
    }

    /* TITLE */
    .title {
      width: 100%;
      max-width: 2600px;
      display: block;
      margin: 140px auto 0;
      position: relative;
      z-index: 1;
    }

    /* 🔥 CONTACT BOX — EVEN HIGHER NOW */
    .contact-container {
      background-color: #ffc0cb;

      max-width: 2000px;

      margin: -750px auto 120px; /* 🔥 WAY higher than before */

      padding: 260px;

      border-radius: 60px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);

      text-align: center;

      position: relative;
      z-index: 20;
    }

    .contact-container h1 {
      font-size: 9rem;
      margin-top: 0;
    }

    .contact-container p {
      font-size: 3rem;
      line-height: 1.6;
      margin-bottom: 70px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    input, textarea {
      padding: 30px;
      font-size: 2rem;

      border-radius: 18px;
      border: 2px solid #ccc;

      width: 92%;
      max-width: 1400px;
      box-sizing: border-box;
    }

    button {
      background-color: #ff6398;
      color: #fff;
      border: none;

      padding: 45px 90px;
      font-size: 3rem;

      border-radius: 25px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ff4d82;
    }
  </style>
</head>

<body>

  <div class="header">
    <a href="index.html">Home</a>
    <a href="purchase.html">Purchase</a>
    <a href="submitart.html">Submit Art</a>
    <a href="contact.html">Contact</a>
  </div>

  <img src="hometitle1.jpg" alt="STATIK" class="title">

  <div class="contact-container">
    <h1>Contact Us</h1>

    <p>
      Have questions, ideas, or art to submit? Reach out to us!  
      You can email directly at <a href="mailto:veronicafridman63@gmail.com">veronicafridman63@gmail.com</a>  
      or fill out the form below:
    </p>

    <form action="mailto:veronicafridman63@gmail.com" method="post" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

</body>
</html>
